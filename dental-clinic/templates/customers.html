{% extends 'base.html' %}
{% block title %}客户档案{% endblock %}
{% block page_title %}客户档案{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header">
    <h2>客户档案管理</h2>
    <div style="display:flex;gap:8px">
      <a href="/api/customers/export" class="btn btn-sm btn-outline">📥 导出Excel</a>
      <button class="btn btn-sm btn-primary" onclick="openNewCustomer()">➕ 新增客户</button>
    </div>
  </div>
  <!-- 搜索栏 -->
  <div class="search-bar">
    <input type="text" id="search-q" class="form-control" placeholder="🔍 姓名/手机号搜索" oninput="debounceSearch()">
    <select id="search-tag" class="form-select" style="max-width:160px" onchange="loadCustomers()">
      <option value="">全部标签</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="loadCustomers()">搜索</button>
  </div>
  <!-- 表格 -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>姓名</th><th>性别</th><th>手机号</th><th>标签</th>
          <th>接诊次数</th><th>建档时间</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="customer-tbody">
        <tr><td colspan="7" class="loading"><span class="spin">⏳</span>&nbsp;加载中...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- 新增/编辑客户模态框 -->
<div class="modal-overlay" id="modal-customer">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="modal-customer-title">新增客户</h3>
      <button class="btn-icon" onclick="closeModal('modal-customer')">✕</button>
    </div>
    <div class="modal-body">
      <div class="section-title">基础信息</div>
      <div class="form-row col3">
        <div class="form-group">
          <label class="form-label">姓名 <span class="req">*</span></label>
          <input type="text" id="c-name" class="form-control" placeholder="患者姓名">
        </div>
        <div class="form-group">
          <label class="form-label">性别</label>
          <select id="c-gender" class="form-select">
            <option value="">请选择</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">出生年份</label>
          <input type="number" id="c-birth-year" class="form-control" placeholder="如 1990" min="1920" max="2020">
        </div>
      </div>
      <div class="form-row col2">
        <div class="form-group">
          <label class="form-label">手机号 <span class="req">*</span></label>
          <input type="tel" id="c-phone" class="form-control" placeholder="11位手机号">
        </div>
        <div class="form-group">
          <label class="form-label">微信号</label>
          <input type="text" id="c-wechat" class="form-control" placeholder="微信号（可选）">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">居住地址</label>
        <input type="text" id="c-address" class="form-control" placeholder="地址（可选）">
      </div>
      <div class="section-title" style="margin-top:8px">口腔基础信息</div>
      <div class="form-row col2">
        <div class="form-group">
          <label class="form-label">既往口腔病史</label>
          <textarea id="c-dental-history" class="form-control" placeholder="如：曾有龋齿、做过根管治疗等"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">药物过敏史</label>
          <textarea id="c-allergy-history" class="form-control" placeholder="如：青霉素过敏等，无则填无"></textarea>
        </div>
      </div>
      <div class="form-row col2">
        <div class="form-group">
          <label class="form-label">全身基础病史</label>
          <textarea id="c-systemic-disease" class="form-control" placeholder="如：高血压、糖尿病等，无则填无"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">牙齿基础情况</label>
          <textarea id="c-dental-condition" class="form-control" placeholder="如：牙齿排列、缺牙情况等"></textarea>
        </div>
      </div>
      <div class="section-title" style="margin-top:8px">客户标签</div>
      <div class="tag-list" id="customer-tags"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-customer')">取消</button>
      <button class="btn btn-primary" onclick="saveCustomer()">保存</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage=1, editingId=null, selectedTags=[], allTags=[];
const perPage=20;

// 加载标签字典
async function loadTagDict(){
  const r=await api('/api/dict/customer_tag');
  allTags=r.data||[];
  // 填充筛选下拉
  const sel=document.getElementById('search-tag');
  allTags.forEach(t=>{
    const op=document.createElement('option');op.value=t.name;op.textContent=t.name;sel.appendChild(op);
  });
  // 填充标签编辑区
  renderTagEditor();
}

function renderTagEditor(){
  const wrap=document.getElementById('customer-tags');
  wrap.innerHTML='';
  allTags.forEach(t=>{
    const el=document.createElement('span');
    el.className='tag'+(selectedTags.includes(t.name)?' selected':'');
    el.textContent=t.name;
    el.onclick=()=>{
      if(selectedTags.includes(t.name))selectedTags=selectedTags.filter(x=>x!==t.name);
      else selectedTags.push(t.name);
      renderTagEditor();
    };
    wrap.appendChild(el);
  });
}

async function loadCustomers(){
  const q=document.getElementById('search-q').value.trim();
  const tag=document.getElementById('search-tag').value;
  const params=new URLSearchParams({q,tag,page:currentPage,per_page:perPage});
  const r=await api(`/api/customers?${params}`);
  const tbody=document.getElementById('customer-tbody');
  if(!r.data||r.data.length===0){
    tbody.innerHTML='<tr><td colspan="7"><div class="empty"><div class="icon">👥</div><p>暂无客户数据</p></div></td></tr>';
    document.getElementById('pagination').innerHTML='';return;
  }
  tbody.innerHTML=r.data.map(c=>`
    <tr>
      <td><a href="/customers/${c.id}" style="font-weight:500">${c.name}</a></td>
      <td>${c.gender||'-'}</td>
      <td>${c.phone}</td>
      <td>${(c.tags||[]).map(t=>`<span class="badge badge-primary">${t}</span>`).join(' ')||'-'}</td>
      <td><span class="badge badge-info">${c.treatment_count}</span></td>
      <td>${(c.created_at||'').slice(0,10)}</td>
      <td>
        <button class="btn-icon" title="编辑" onclick="editCustomer(${c.id})">✏️</button>
        <button class="btn-icon" title="查看档案" onclick="location.href='/customers/${c.id}'">📋</button>
        ${window._isAdmin?`<button class="btn-icon" title="删除" onclick="deleteCustomer(${c.id},'${c.name}')">🗑️</button>`:''}
      </td>
    </tr>
  `).join('');
  // 分页
  const totalPages=Math.ceil(r.total/perPage);
  const pg=document.getElementById('pagination');
  pg.innerHTML='';
  if(totalPages>1){
    const info=document.createElement('span');info.style.fontSize='12px';info.style.color='#9E9E9E';
    info.textContent=`共${r.total}条`;pg.appendChild(info);
    for(let i=1;i<=Math.min(totalPages,8);i++){
      const btn=document.createElement('button');btn.className='page-btn'+(i===currentPage?' active':'');
      btn.textContent=i;btn.onclick=()=>{currentPage=i;loadCustomers()};pg.appendChild(btn);
    }
  }
}

let _searchTimer;
function debounceSearch(){clearTimeout(_searchTimer);_searchTimer=setTimeout(()=>{currentPage=1;loadCustomers()},400)}

function openNewCustomer(){
  editingId=null;selectedTags=[];
  document.getElementById('modal-customer-title').textContent='新增客户';
  ['c-name','c-phone','c-wechat','c-address','c-dental-history','c-allergy-history','c-systemic-disease','c-dental-condition'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('c-gender').value='';
  document.getElementById('c-birth-year').value='';
  renderTagEditor();
  openModal('modal-customer');
}

async function editCustomer(id){
  const r=await api(`/api/customers/${id}`);
  if(!r.success){toast(r.msg,'error');return}
  const c=r.data;
  editingId=id;
  selectedTags=[...(c.tags||[])];
  document.getElementById('modal-customer-title').textContent='编辑客户';
  document.getElementById('c-name').value=c.name||'';
  document.getElementById('c-gender').value=c.gender||'';
  document.getElementById('c-birth-year').value=c.birth_year||'';
  document.getElementById('c-phone').value=c.phone||'';
  document.getElementById('c-wechat').value=c.wechat||'';
  document.getElementById('c-address').value=c.address||'';
  document.getElementById('c-dental-history').value=c.dental_history||'';
  document.getElementById('c-allergy-history').value=c.allergy_history||'';
  document.getElementById('c-systemic-disease').value=c.systemic_disease||'';
  document.getElementById('c-dental-condition').value=c.dental_condition||'';
  renderTagEditor();
  openModal('modal-customer');
}

async function saveCustomer(){
  const name=document.getElementById('c-name').value.trim();
  const phone=document.getElementById('c-phone').value.trim();
  if(!name){toast('请输入姓名','error');return}
  if(!phone){toast('请输入手机号','error');return}
  const body={
    name,phone,
    gender:document.getElementById('c-gender').value,
    birth_year:document.getElementById('c-birth-year').value||null,
    wechat:document.getElementById('c-wechat').value.trim(),
    address:document.getElementById('c-address').value.trim(),
    dental_history:document.getElementById('c-dental-history').value.trim(),
    allergy_history:document.getElementById('c-allergy-history').value.trim(),
    systemic_disease:document.getElementById('c-systemic-disease').value.trim(),
    dental_condition:document.getElementById('c-dental-condition').value.trim(),
    tags:selectedTags
  };
  const url=editingId?`/api/customers/${editingId}`:'/api/customers';
  const method=editingId?'PUT':'POST';
  const r=await api(url,method,body);
  if(r.success){
    toast(r.msg,'success');closeModal('modal-customer');
    if(!editingId&&r.id)setTimeout(()=>location.href=`/customers/${r.id}`,600);
    else loadCustomers();
  }else toast(r.msg,'error');
}

async function deleteCustomer(id,name){
  if(!confirm(`确认删除客户「${name}」？删除后不可恢复。`)){return}
  const r=await api(`/api/customers/${id}`,'DELETE');
  if(r.success){toast('已删除','success');loadCustomers()}
  else toast(r.msg,'error');
}

// 初始化
window._isAdmin = {{ 'true' if user and user.role=='admin' else 'false' }};
loadTagDict();
loadCustomers();

// 支持从工作台跳转直接打开新增
if(location.hash==='#new')openNewCustomer();
</script>
{% endblock %}
